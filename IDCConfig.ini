# IDCConfig.ini - CloudInit 服务配置文件
# 所有配置项均为可选，未配置则使用默认值
# 修改后重启服务生效

[server]
# 上报间隔（秒），默认60
# report_interval = 60

# 上报端口，默认1880
# report_port = 1880

# 上报API路径
# report_path = /api/client/upload

# 上报目标地址（留空则自动从网关推算）
# 如需指定固定地址，填写IP即可，如: report_host = 192.168.1.2
# report_host =

# 网关偏移量（默认2，即网关为x.x.x.1时上报到x.x.x.2）
# 设为0表示直接上报到网关地址
# gateway_offset = 2

[update]
# 是否启用自动更新，默认true
# enabled = true

# 更新检查间隔（秒），默认86400（24小时）
# interval = 86400

# GitHub Release API 地址
# repo_url = https://api.github.com/repos/OpenIDCSTeam/CloudInit/releases/latest

[log]
# 日志级别: DEBUG / INFO / WARNING / ERROR
# level = INFO

# 日志保留时间
# retention = 7 days
