name: Build & Release CloudInit

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      version:
        description: '发布版本号 (例如 v1.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            name: linux
            python-version: '3.11'
            artifact-name: cloudinit-linux
            ext: ''

          - os: macos-latest
            name: macos
            python-version: '3.11'
            artifact-name: cloudinit-macos
            ext: ''

          - os: windows-latest
            name: win10
            python-version: '3.13'
            artifact-name: cloudinit-win10
            ext: '.exe'

          # - os: windows-2019
          #   name: win7
          #   python-version: '3.8'
          #   artifact-name: cloudinit-win7
          #   ext: '.exe'

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache pip packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-${{ matrix.python-version }}-
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install pyinstaller
        pip install netifaces requests GPUtil psutil py-cpuinfo urllib3 loguru

    - name: Build with PyInstaller
      run: |
        pyinstaller CloudInit.spec

    - name: Create artifact (Windows)
      if: runner.os == 'Windows'
      run: |
        mkdir dist-artifact
        copy dist\CloudInit${{ matrix.ext }} dist-artifact\

    - name: Create artifact (Linux/Mac)
      if: runner.os != 'Windows'
      run: |
        mkdir -p dist-artifact
        cp dist/CloudInit${{ matrix.ext }} dist-artifact/

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact-name }}
        path: dist-artifact/
        retention-days: 30

  # Push 自动发布到 beta release
  release-beta:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Display structure of downloaded files
      run: ls -R artifacts

    - name: Delete existing beta tag
      run: |
        git push origin :refs/tags/beta || true

    - name: Create/Update beta tag
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git tag -fa beta -m "Beta build from ${{ github.sha }}"
        git push origin beta --force

    - name: Rename artifacts for release
      run: |
        mv artifacts/cloudinit-linux/CloudInit artifacts/cloudinit-linux/CloudInit-linux
        mv artifacts/cloudinit-macos/CloudInit artifacts/cloudinit-macos/CloudInit-macos

    - name: Create/Update Beta Release
      uses: softprops/action-gh-release@v1
      with:
        fail_on_unmatched_files: false
        files: |
          artifacts/cloudinit-linux/CloudInit-linux
          artifacts/cloudinit-macos/CloudInit-macos
          artifacts/cloudinit-win10/CloudInit.exe
        tag_name: beta
        name: Beta Build (Latest)
        body: |
          🚧 **自动构建的 Beta 版本**
          
          提交: ${{ github.sha }}
          分支: ${{ github.ref_name }}
          时间: ${{ github.event.head_commit.timestamp }}
          
          > 此版本随每次 push 自动更新，仅供测试使用。
        draft: false
        prerelease: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 手动触发发布正式版本
  release-stable:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Display structure of downloaded files
      run: ls -R artifacts

    - name: Create version tag
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git tag -a ${{ github.event.inputs.version }} -m "Release ${{ github.event.inputs.version }}"
        git push origin ${{ github.event.inputs.version }}

    - name: Rename artifacts for release
      run: |
        mv artifacts/cloudinit-linux/CloudInit artifacts/cloudinit-linux/CloudInit-linux
        mv artifacts/cloudinit-macos/CloudInit artifacts/cloudinit-macos/CloudInit-macos

    - name: Create Stable Release
      uses: softprops/action-gh-release@v1
      with:
        fail_on_unmatched_files: false
        files: |
          artifacts/cloudinit-linux/CloudInit-linux
          artifacts/cloudinit-macos/CloudInit-macos
          artifacts/cloudinit-win10/CloudInit.exe
        tag_name: ${{ github.event.inputs.version }}
        name: Release ${{ github.event.inputs.version }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}